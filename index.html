<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auraic | Your Personal Styling OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --black: #0B0B0B;
            --white: #F8F8F8;
            --grey: #1A1A1A;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        /* Animated background glow */
        .aura-bg {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--gold);
            filter: blur(160px);
            opacity: 0.12;
            z-index: -1;
            animation: move 8s infinite alternate ease-in-out;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(20%, 20%); }
        }

        .container {
            padding: 2rem;
            max-width: 400px;
        }

        .status-badge {
            display: inline-block;
            border: 1px solid rgba(212, 175, 55, 0.3);
            background: rgba(212, 175, 55, 0.05);
            color: var(--gold);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2rem;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            margin: 0;
            font-style: italic;
            background: linear-gradient(135deg, #FFF 30%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem;
            font-weight: 300;
            line-height: 1.6;
            margin: 1.5rem 0;
            color: rgba(255, 255, 255, 0.7);
        }

        .cta-box {
            margin-top: 3rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 2rem;
        }

        .date {
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--white);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="aura-bg"></div>

    <div class="container">
        <div class="status-badge">Private Beta • Spring 2026</div>
        
        <h1>Auraic</h1>
        
        <p>Shop your own closet. Visualize every fit. Master your personal aura.</p>

        <div class="cta-box">
            <span class="date">LAUNCHING IN 10 DAYS</span>
        </div>
    </div>
</body>
</html>
